<!DOCTYPE html>
<html>

<head>

    <title>
        Siddhu Personal AI
    </title>

    <style>

        body {

            background: black;
            color: white;
            font-family: Arial;

            margin: 0;
            padding: 0;
        }

        .container {

            width: 80%;
            margin: auto;
            padding-top: 30px;
        }

        h1 {

            color: white;
            text-align: center;
        }

        #chatbox {

            height: 500px;

            border: 1px solid #444;

            padding: 20px;

            overflow-y: auto;

            margin-bottom: 20px;

            border-radius: 10px;

            background: #111;
        }

        .input-area {

            display: flex;
            gap: 10px;
        }

        input {

            flex: 1;

            padding: 15px;

            font-size: 18px;

            background: #1e1e1e;

            color: white;

            border: 1px solid #555;

            border-radius: 10px;

            outline: none;
        }

        button {

            padding: 15px 25px;

            font-size: 18px;

            background: #2563eb;

            color: white;

            border: none;

            border-radius: 10px;

            cursor: pointer;
        }

        button:hover {

            background: #1d4ed8;
        }

        p {

            line-height: 1.6;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>
        🔥 Siddhu Personal AI
    </h1>

    <div id="chatbox"></div>

    <div class="input-area">

        <input
            type="text"
            id="message"
            placeholder="Ask anything..."
            onkeypress="handleEnter(event)"
        >

        <button onclick="startVoice()">
            🎤
        </button>

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

const BACKEND_URL =
"https://personal-ai-k3rx.onrender.com"

async function sendMessage() {

    let messageInput =
        document.getElementById(
            "message"
        )

    let message =
        messageInput.value

    if (message.trim() === "") {

        return
    }

    let chatbox =
        document.getElementById(
            "chatbox"
        )

    // USER MESSAGE

    chatbox.innerHTML += `
        <p>
            <b>You:</b> ${message}
        </p>
    `

    // AI MESSAGE

    let aiMessage =
        document.createElement("p")

    aiMessage.innerHTML =
        "<b>AI:</b> "

    chatbox.appendChild(
        aiMessage
    )

    // CLEAR INPUT

    messageInput.value = ""

    try {

        // FETCH STREAM

        const response = await fetch(
            BACKEND_URL,
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({
                    message: message
                })
            }
        )

        const reader =
            response.body.getReader()

        const decoder =
            new TextDecoder()

        while (true) {

            const {
                done,
                value
            } = await reader.read()

            if (done) break

            const chunk =
                decoder.decode(value)

            aiMessage.innerHTML += chunk

            chatbox.scrollTop =
                chatbox.scrollHeight
        }

    } catch (error) {

        aiMessage.innerHTML +=
            " Server error or backend offline."
    }
}

function startVoice() {

    let recognition =
        new webkitSpeechRecognition()

    recognition.lang = "en-US"

    recognition.onresult = function(event) {

        let text =
            event.results[0][0]
            .transcript

        document.getElementById(
            "message"
        ).value = text

        sendMessage()
    }

    recognition.start()
}

function handleEnter(event) {

    if (event.key === "Enter") {

        sendMessage()
    }
}

</script>

</body>
</html>
